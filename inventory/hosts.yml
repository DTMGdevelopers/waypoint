---
# Waypoint regression suite — site inventory
#
# Each entry represents a theme repo with Waypoint wired up.
# GitHub Actions vars/secrets (credentials, SSH keys) remain in the repo settings.
# This inventory holds the test-relevant metadata: URLs, paths, report locations.
#
# To add a new site:
#   1. Add an entry under waypoint_sites (or waypoint_maintenance if not yet stable)
#   2. Add the deploy-report job to the theme repo's workflow (see visioncruise-uk as the reference)
#   3. Set BASE_URL (and SEARCH_PATH if non-standard) in the repo's GitHub Actions variables

all:
  children:

    waypoint_sites:
      hosts:

        visioncruise:
          github_repo: DTMGdevelopers/visioncruise-uk
          github_workflow: playwright.yml
          base_url: https://www.visioncruise.co.uk
          report_url: https://www.visioncruise.co.uk/test-report/
          deploy_host: 172.237.105.38
          deploy_site_path: /home/wordpress/www.visioncruise.co.uk

        cruise_line_latvia:
          github_repo: DTMGdevelopers/cruise-line-latvia-theme
          github_workflow: deploy.yml
          base_url: https://cll.dev.digitaltravel.network
          search_path: /lv/meklesana/?traveltype=ocean
          report_url: https://cll.dev.digitaltravel.network/test-report/
          deploy_host: 172.236.14.15
          deploy_site_path: /sites/cll.dev.digitaltravel.network/files

        century_cyprus:
          github_repo: DTMGdevelopers/century-cyprus-theme
          github_workflow: playwright.yml
          base_url: https://cruise.centurycyprus.com
          report_url: https://cruise.centurycyprus.com/test-report/
          deploy_host: 172.237.109.36
          deploy_site_path: /home/wordpress/cruise.centurycyprus.com
          environments:
            dev: https://cc.dev.digitaltravel.network
            staging: https://cc.stg.digitaltravel.network
            live: https://cruise.centurycyprus.com

    waypoint_maintenance:
      hosts:
        # Sites where regression is paused — add back to waypoint_sites when stable
        # example_site:
        #   github_repo: DTMGdevelopers/example-theme
        #   base_url: https://example.com
