name: Regression — automation

on:
  schedule:
    # Nightly at 03:00 UTC
    - cron: '0 3 * * *'

  # Manual trigger — optionally override the target URL
  workflow_dispatch:
    inputs:
      base_url:
        description: 'Override site URL (leave blank to use automation.ts default)'
        required: false
        default: ''

  # Reusable — called from json-starter-theme on push/PR
  workflow_call:
    inputs:
      base_url:
        description: 'Site URL to test'
        type: string
        required: false
    secrets:
      TEST_USER_EMAIL:
        required: false
      TEST_USER_PASSWORD:
        required: false

env:
  THEME: automation
  BASE_URL: ${{ inputs.base_url || vars.AUTOMATION_BASE_URL || 'https://automation.dev.digitaltravel.network' }}
  TEST_USER_EMAIL: ${{ secrets.TEST_USER_EMAIL }}
  TEST_USER_PASSWORD: ${{ secrets.TEST_USER_PASSWORD }}
  CI: 'true'

jobs:
  # ── Stage 1: smoke — fast fail ──────────────────────────────────────────────
  smoke:
    name: Smoke — automation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run smoke tests
        run: npx playwright test tests/smoke/ --project=chromium

      - name: Upload smoke report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-report-automation-${{ github.run_id }}
          path: playwright-report/
          retention-days: 7

  # ── Stage 2: full regression — sharded ─────────────────────────────────────
  regression:
    name: Regression — automation (shard ${{ matrix.shard }}/4)
    runs-on: ubuntu-latest
    needs: smoke
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3, 4]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Run regression suite (shard ${{ matrix.shard }}/4)
        run: npx playwright test --shard=${{ matrix.shard }}/4 --reporter=blob

      - name: Upload blob report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: blob-report-automation-${{ matrix.shard }}
          path: blob-report/
          retention-days: 14

  # ── Stage 3: merge blob reports into a single HTML report ──────────────────
  report:
    name: Merge reports — automation
    runs-on: ubuntu-latest
    needs: regression
    if: needs.regression.result == 'success' || needs.regression.result == 'failure'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Download all blob reports
        uses: actions/download-artifact@v4
        with:
          pattern: blob-report-automation-*
          path: all-blob-reports/
          merge-multiple: true

      - name: Merge into single HTML report
        run: npx playwright merge-reports --reporter html ./all-blob-reports

      - name: Upload merged report
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-automation-${{ github.run_id }}
          path: playwright-report/
          retention-days: 30
