name: Regression suite

on:
  push:
    branches: [main]
  schedule:
    # Nightly at 02:00 UTC against the default BASE_URL variable
    - cron: '0 2 * * *'

  # Manual trigger — optionally override the target URL and per-site paths
  workflow_dispatch:
    inputs:
      base_url:
        description: 'Site URL to test (leave blank to use BASE_URL variable)'
        required: false
        default: ''
      search_path:
        description: 'Search page path, may include query string (e.g. /lv/meklesana/?traveltype=ocean)'
        required: false
        default: ''
      test_cruise_path:
        description: 'Path to a cruise detail page for the cruise-detail step test'
        required: false
        default: ''
      test_occupancy_path:
        description: 'Path + query string for the occupancy step test'
        required: false
        default: ''

  # Reusable — called from any theme repo
  workflow_call:
    inputs:
      base_url:
        description: 'Site URL to test'
        type: string
        required: false
      search_path:
        description: 'Search page path, may include query string'
        type: string
        required: false
      test_cruise_path:
        description: 'Path to a cruise detail page for step tests'
        type: string
        required: false
      test_occupancy_path:
        description: 'Path + query string for the occupancy step test'
        type: string
        required: false
    secrets:
      TEST_USER_EMAIL:
        required: false
      TEST_USER_PASSWORD:
        required: false
      PAYMENT_PROVIDER:
        required: false

env:
  # inputs.* (from workflow_dispatch / workflow_call) take priority;
  # fall back to repository variables for push / schedule triggers.
  BASE_URL: ${{ inputs.base_url || vars.BASE_URL }}
  SEARCH_PATH: ${{ inputs.search_path || vars.SEARCH_PATH }}
  TEST_USER_EMAIL: ${{ secrets.TEST_USER_EMAIL }}
  TEST_USER_PASSWORD: ${{ secrets.TEST_USER_PASSWORD }}
  PAYMENT_PROVIDER: ${{ secrets.PAYMENT_PROVIDER || 'stripe' }}
  TEST_CRUISE_PATH: ${{ inputs.test_cruise_path || vars.TEST_CRUISE_PATH }}
  TEST_OCCUPANCY_PATH: ${{ inputs.test_occupancy_path || vars.TEST_OCCUPANCY_PATH }}
  CI: 'true'

jobs:
  # ── Stage 1: smoke — fast fail ──────────────────────────────────────────────
  smoke:
    name: Smoke tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          repository: DTMGdevelopers/waypoint

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run smoke tests
        run: npx playwright test tests/smoke/ --project=chromium

      - name: Upload smoke report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-report
          path: playwright-report/
          retention-days: 7

  # ── Stage 2: full regression — sharded ─────────────────────────────────────
  regression:
    name: Regression (shard ${{ matrix.shard }}/4)
    runs-on: ubuntu-latest
    needs: smoke
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3, 4]
    steps:
      - uses: actions/checkout@v4
        with:
          repository: DTMGdevelopers/waypoint

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Run regression suite (shard ${{ matrix.shard }}/4)
        run: npx playwright test --shard=${{ matrix.shard }}/4 --reporter=blob

      - name: Upload blob report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: blob-report-${{ matrix.shard }}
          path: blob-report/
          retention-days: 14

  # ── Stage 3: merge blob reports into a single HTML report ──────────────────
  report:
    name: Merge reports
    runs-on: ubuntu-latest
    needs: regression
    if: always()
    steps:
      - uses: actions/checkout@v4
        with:
          repository: DTMGdevelopers/waypoint

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Download all blob reports
        uses: actions/download-artifact@v4
        with:
          pattern: blob-report-*
          path: all-blob-reports/
          merge-multiple: true

      - name: Merge into single HTML report
        run: npx playwright merge-reports --reporter html ./all-blob-reports

      - name: Upload merged report
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30
