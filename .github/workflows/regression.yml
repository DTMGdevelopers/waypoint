name: Regression suite

on:
  push:
    branches: [main]
  schedule:
    # Nightly at 02:00 UTC against the default BASE_URL secret
    - cron: '0 2 * * *'

  # Manual trigger — optionally override the target URL
  workflow_dispatch:
    inputs:
      base_url:
        description: 'Site URL to test (leave blank to use BASE_URL secret)'
        required: false
        default: ''

  # Reusable — called from any theme repo
  workflow_call:
    inputs:
      base_url:
        description: 'Site URL to test'
        type: string
        required: false
    secrets:
      BASE_URL:
        required: false
      TEST_USER_EMAIL:
        required: false
      TEST_USER_PASSWORD:
        required: false
      PAYMENT_PROVIDER:
        required: false

env:
  # inputs.base_url (from workflow_dispatch / workflow_call) takes priority;
  # falls back to the BASE_URL repository variable for push / schedule triggers.
  BASE_URL: ${{ inputs.base_url || vars.BASE_URL }}
  TEST_USER_EMAIL: ${{ secrets.TEST_USER_EMAIL }}
  TEST_USER_PASSWORD: ${{ secrets.TEST_USER_PASSWORD }}
  PAYMENT_PROVIDER: ${{ secrets.PAYMENT_PROVIDER || 'stripe' }}
  CI: 'true'

jobs:
  # ── Stage 1: smoke — fast fail ──────────────────────────────────────────────
  smoke:
    name: Smoke tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run smoke tests
        run: npx playwright test tests/smoke/ --project=chromium

      - name: Upload smoke report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-report
          path: playwright-report/
          retention-days: 7

  # ── Stage 2: full regression — sharded ─────────────────────────────────────
  regression:
    name: Regression (shard ${{ matrix.shard }}/4)
    runs-on: ubuntu-latest
    needs: smoke
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3, 4]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Run regression suite (shard ${{ matrix.shard }}/4)
        run: npx playwright test --shard=${{ matrix.shard }}/4 --reporter=blob

      - name: Upload blob report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: blob-report-${{ matrix.shard }}
          path: blob-report/
          retention-days: 14

  # ── Stage 3: merge blob reports into a single HTML report ──────────────────
  report:
    name: Merge reports
    runs-on: ubuntu-latest
    needs: regression
    if: always()
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Download all blob reports
        uses: actions/download-artifact@v4
        with:
          pattern: blob-report-*
          path: all-blob-reports/

      - name: Merge into single HTML report
        run: npx playwright merge-reports --reporter html all-blob-reports/

      - name: Upload merged report
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: playwright-report/

      # Optional: post a Slack notification on failure.
      # Uncomment and add SLACK_WEBHOOK to repository secrets.
      # - name: Notify Slack on failure
      #   if: failure()
      #   uses: slackapi/slack-github-action@v1
      #   with:
      #     payload: |
      #       {
      #         "text": ":red_circle: Waypoint regression failed on `${{ github.ref_name }}`",
      #         "attachments": [{"text": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"}]
      #       }
      #   env:
      #     SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK }}

  # ── Stage 4: publish report to GitHub Pages ────────────────────────────────
  deploy-pages:
    name: Publish report to GitHub Pages
    runs-on: ubuntu-latest
    needs: report
    if: always()
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - id: deploy
        uses: actions/deploy-pages@v4
