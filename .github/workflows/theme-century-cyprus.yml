name: Regression — century-cyprus

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Nightly at 04:00 UTC (staggered to avoid resource contention with other theme runs)
    - cron: '0 4 * * *'
  workflow_dispatch:
    inputs:
      base_url:
        description: 'Override site URL (leave blank to use CENTURY_CYPRUS_BASE_URL variable)'
        required: false
        default: ''

env:
  THEME: century-cyprus
  BASE_URL: ${{ inputs.base_url || vars.CENTURY_CYPRUS_BASE_URL }}
  TEST_USER_EMAIL: ${{ secrets.TEST_USER_EMAIL }}
  TEST_USER_PASSWORD: ${{ secrets.TEST_USER_PASSWORD }}
  PAYMENT_PROVIDER: ${{ secrets.PAYMENT_PROVIDER || 'stripe' }}
  CI: 'true'

jobs:
  smoke:
    name: Smoke — century-cyprus
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run smoke tests
        run: npx playwright test tests/smoke/ --project=chromium

      - name: Upload smoke report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-report-century-cyprus-${{ github.run_id }}
          path: playwright-report/
          retention-days: 7

  regression:
    name: Regression — century-cyprus (shard ${{ matrix.shard }}/4)
    runs-on: ubuntu-latest
    needs: smoke
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3, 4]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Run regression suite (shard ${{ matrix.shard }}/4)
        run: npx playwright test --shard=${{ matrix.shard }}/4 --reporter=blob

      - name: Upload blob report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: blob-report-century-cyprus-${{ matrix.shard }}
          path: blob-report/
          retention-days: 14

  report:
    name: Merge reports — century-cyprus
    runs-on: ubuntu-latest
    needs: regression
    if: always()
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Download all blob reports
        uses: actions/download-artifact@v4
        with:
          pattern: blob-report-century-cyprus-*
          path: all-blob-reports/
          merge-multiple: true

      - name: Merge into single HTML report
        run: npx playwright merge-reports --reporter html ./all-blob-reports

      - name: Upload merged report
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-century-cyprus-${{ github.run_id }}
          path: playwright-report/
          retention-days: 30
